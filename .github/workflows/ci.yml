name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://training-partner-app.elor-orry.workers.dev
          NEXT_PUBLIC_SITE_URL: https://trainingpartner.app

      - run: npx tsc --noEmit
