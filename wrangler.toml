name = "training-partner-app"
main = "worker/index.js"
compatibility_date = "2026-03-09"
workers_dev = true

[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://training-partner.vercel.app"
# Stripe keys — set STRIPE_SECRET_KEY and STRIPE_WEBHOOK_SECRET via `wrangler secret put`
# Create price IDs in Stripe Dashboard → Products → Add product
STRIPE_PRICE_PREMIUM_ATHLETE = ""  # $9.99/mo athlete plan price ID
STRIPE_PRICE_PREMIUM_GYM = ""     # $19.99/mo gym plan price ID
# Google OAuth — set GOOGLE_CLIENT_ID here, matching NEXT_PUBLIC_GOOGLE_CLIENT_ID on Vercel
GOOGLE_CLIENT_ID = ""

# JWT_SECRET must be set via `wrangler secret put JWT_SECRET` for production.
# For local dev, wrangler dev injects it from [env.dev.vars] below.

[env.dev.vars]
JWT_SECRET = "tp-dev-secret-local-only"
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "training-partner"
database_id = "30d075cd-2994-4d08-8aef-7ed1a415d9bb"
migrations_dir = "./migrations"
